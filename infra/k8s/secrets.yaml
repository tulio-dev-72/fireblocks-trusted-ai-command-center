apiVersion: v1
kind: Secret
metadata:
  name: taicc-secrets
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_KMS_SECRET"
  FIREBLOCKS_API_KEY: "REPLACE_WITH_FIREBLOCKS_API_KEY"
  DATABASE_URL: "postgresql://taicc:REPLACE@postgres:5432/taicc"
  REDIS_URL: "redis://redis:6379"
  # Fireblocks secret key mounted as volume, not env var (SR-4.1)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: taicc-config
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  POLICY_ENFORCEMENT_MODE: "enforce"
  POLICY_DEFAULT_ACTION: "deny"
  FIREBLOCKS_BASE_PATH: "https://api.fireblocks.io/v1"
  FIREBLOCKS_SECRET_KEY_PATH: "/secrets/fireblocks/secret.key"
  API_CORS_ORIGINS: "https://command-center.example.com"
